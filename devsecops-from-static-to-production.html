    <h1>DevSecOps Journey: From Static Hosting to Production</h1>
    <p class="lead">How I moved my portfolio site from shared hosting to a fully self-managed, containerized, monitored and secured setup following DevSecOps principles.</p>

    <p><strong>Start date:</strong> January 2026<br>
       <strong>Current status:</strong> Production live, staging in progress, monitoring & backups running</p>

    <hr>

    <h2>1. Initial Situation & Goal</h2>
    <ul>
      <li>Site was hosted on shared hosting (Ionos)</li>
      <li>Static HTML + Bootstrap template (iPortfolio)</li>
      <li>Goal: move to own VPS, apply DevSecOps practices, document everything for learning & showcase</li>
    </ul>

    <h2>2. VPS Setup & Hardening</h2>
    <p>Switched from Rocky Linux to Ubuntu 24.04 LTS for better tooling support.</p>

    <pre><code># Create non-root user
adduser awash
usermod -aG sudo awash

# Disable root login & password auth
sudo nano /etc/ssh/sshd_config
# → PermitRootLogin no
# → PasswordAuthentication no
sudo systemctl restart ssh

# Firewall
sudo ufw allow OpenSSH
sudo ufw enable
</code></pre>

    <p><strong>Troubleshooting:</strong> Forgot to add user to sudo group → got locked out → had to use Ionos console to fix.</p>

    <h2>3. Containerization</h2>
    <p>Installed Docker & Compose, created custom Dockerfile, pushed image to Docker Hub.</p>

    <pre><code>docker build -t awashawash/awash-portfolio:latest .
docker push awashawash/awash-portfolio:latest
</code></pre>

    <p><strong>Challenge:</strong> Initial push failed due to large video file (>100 MB).<br>
       <strong>Solution:</strong> Removed video from git history with <code>git filter-repo</code>, re-committed & pushed.</p>

    <h2>4. Cloudflare Integration</h2>
    <p>HTTPS, HSTS, proxy enabled. Staging subdomain on custom port (8081).</p>

    <p><strong>Challenge:</strong> DNS for staging subdomain not resolving.<br>
       <strong>Workaround (temporary):</strong> Testing via direct IP + port[](http://217.154.44.73:8081)</p>

    <h2>5. Security Scanning</h2>
    <p>Trivy on container image, SonarCloud for static analysis.</p>

    <pre><code>trivy image awashawash/awash-portfolio:latest
</code></pre>

    <h2>6. Monitoring</h2>
    <p>Prometheus + Grafana + Netdata.</p>

    <p><strong>Challenge:</strong> Prometheus kept restarting.<br>
       <strong>Solution:</strong> Fixed invalid YAML in prometheus.yml (removed misplaced <code>metrics_path</code>).</p>

    <h2>7. Automated Backups</h2>
    <pre><code># Daily at 3:00 AM
0 3 * * * /home/awash/backup-site.sh >> /home/awash/backups/site/backup.log 2>&1
</code></pre>

    <h2>8. Current Status & Next Steps</h2>
    <ul>
      <li>Production live</li>
      <li>Staging in progress (port 8081)</li>
      <li>Monitoring & backups running</li>
      <li>Planned: alerting, rate limiting, off-site backups, Dependabot</li>
    </ul>

    <h2>Lessons Learned</h2>
    <ul>
      <li>Always validate YAML syntax before restarting services</li>
      <li>Separate production & staging early</li>
      <li>Document everything – it helps when troubleshooting</li>
      <li>Security first: harden server before exposing services</li>
    </ul>

    <p><em>Work in progress – check back for updates!</em></p>
